syntax = "proto3";

package owt.control.v1;

option java_multiple_files = true;

enum ChannelType {
  CHANNEL_TYPE_UNSPECIFIED = 0;
  CHANNEL_TYPE_WSS = 1;
  CHANNEL_TYPE_GRPC = 2;
}

enum MessageType {
  MESSAGE_TYPE_UNSPECIFIED = 0;
  MESSAGE_TYPE_REGISTER = 1;
  MESSAGE_TYPE_REGISTER_ACK = 2;
  MESSAGE_TYPE_HEARTBEAT = 3;
  MESSAGE_TYPE_HEARTBEAT_ACK = 4;
  MESSAGE_TYPE_COMMAND_PUSH = 5;
  MESSAGE_TYPE_COMMAND_ACK = 6;
  MESSAGE_TYPE_COMMAND_RESULT = 7;
  MESSAGE_TYPE_ERROR = 8;
}

enum CommandType {
  COMMAND_TYPE_UNSPECIFIED = 0;
  COMMAND_TYPE_WOL_WAKE = 1;
  COMMAND_TYPE_HOST_REBOOT = 2;
  COMMAND_TYPE_HOST_POWEROFF = 3;
  COMMAND_TYPE_HOST_PROBE_GET = 4;
  COMMAND_TYPE_MONITORING_SET = 5;
  COMMAND_TYPE_PARAMS_GET = 6;
  COMMAND_TYPE_PARAMS_SET = 7;
}

enum CommandStatus {
  COMMAND_STATUS_UNSPECIFIED = 0;
  COMMAND_STATUS_CREATED = 1;
  COMMAND_STATUS_DISPATCHED = 2;
  COMMAND_STATUS_ACKED = 3;
  COMMAND_STATUS_RUNNING = 4;
  COMMAND_STATUS_SUCCEEDED = 5;
  COMMAND_STATUS_FAILED = 6;
  COMMAND_STATUS_TIMED_OUT = 7;
  COMMAND_STATUS_CANCELLED = 8;
}

message Envelope {
  string message_id = 1;
  MessageType message_type = 2;
  string protocol_version = 3;
  ChannelType channel_type = 4;
  int64 sent_at_ms = 5;
  string trace_id = 6;
  string agent_id = 7;

  oneof payload {
    Register register = 20;
    RegisterAck register_ack = 21;
    Heartbeat heartbeat = 22;
    HeartbeatAck heartbeat_ack = 23;
    CommandPush command_push = 24;
    CommandAck command_ack = 25;
    CommandResult command_result = 26;
    ErrorPayload error = 27;
  }
}

message Register {
  string agent_id = 1;
  string site_id = 2;
  string agent_version = 3;
  repeated string capabilities = 4;
}

message RegisterAck {
  bool ok = 1;
  string message = 2;
}

message Heartbeat {
  int64 heartbeat_at_ms = 1;
  string stats_json = 2;
}

message HeartbeatAck {
  int64 server_time_ms = 1;
}

message Command {
  string command_id = 1;
  string idempotency_key = 2;
  CommandType command_type = 3;
  int64 issued_at_ms = 4;
  int64 expires_at_ms = 5;
  int32 timeout_ms = 6;
  int32 max_retry = 7;
  string payload_json = 8;
}

message CommandPush {
  Command command = 1;
}

message CommandAck {
  string command_id = 1;
  CommandStatus status = 2; // expected ACKED
  string message = 3;
}

message CommandResult {
  string command_id = 1;
  CommandStatus final_status = 2; // SUCCEEDED|FAILED|TIMED_OUT|CANCELLED
  int32 exit_code = 3;
  string result_json = 4;
}

message ErrorPayload {
  string code = 1;
  string message = 2;
  string detail = 3;
}

service ControlChannelService {
  rpc Connect(stream Envelope) returns (stream Envelope);
}

