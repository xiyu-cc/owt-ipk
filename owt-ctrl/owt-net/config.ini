[server]
host = 127.0.0.1
port = 9081
threads = 4
enable_rate_limit = true
rate_limit_rps = 20
rate_limit_burst = 40
retry_tick_ms = 250
retry_batch = 100
ws_event_workers = 0
ws_event_queue_capacity = 4096
ws_event_low_priority_drop_threshold_pct = 80
ui_event_send_timeout_ms = 2000
ui_session_queue_limit = 1024

[storage]
db_path = /var/lib/owt-net/owt-net.db
retention_days = 30
cleanup_interval_sec = 3600
