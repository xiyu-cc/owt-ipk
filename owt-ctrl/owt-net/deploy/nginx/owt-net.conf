# owt-net nginx layout:
# - static https + wss entry: 127.0.0.1:9080
# - owt-net backend ws/http service: 127.0.0.1:9081
# - expose domain `owt.wzhex.com:443` to `127.0.0.1:9080` by your edge firewall/LB/NAT

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream owt_net_backend {
    server 127.0.0.1:9081;
    keepalive 32;
}

# oauth2-proxy for Google OIDC authentication.
# Recommended local service endpoint: 127.0.0.1:4180
upstream owt_oauth2_proxy {
    server 127.0.0.1:4180;
    keepalive 16;
}

server {
    listen 127.0.0.1:9080 ssl;
    server_name owt.wzhex.com;

    ssl_certificate     /etc/ssl/local/wzhex.com/fullchain.crt;
    ssl_certificate_key /etc/ssl/local/wzhex.com/private.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;

    root  /var/www/owt;
    index index.html;

    # oauth2-proxy endpoints (Google login/logout/callback).
    location = /oauth2/auth {
        internal;
        proxy_pass              http://owt_oauth2_proxy;
        proxy_http_version      1.1;
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto https;
        proxy_set_header        X-Forwarded-Host $host;
        proxy_set_header        X-Forwarded-Uri $request_uri;
        proxy_set_header        Content-Length "";
        proxy_pass_request_body off;
    }

    location /oauth2/ {
        proxy_pass         http://owt_oauth2_proxy;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    error_page 401 = /oauth2/sign_in;

    location = / {
        auth_request /oauth2/auth;
        try_files /index.html =404;
    }

    location / {
        auth_request /oauth2/auth;
        try_files $uri $uri/ /index.html;
    }

    # Same-origin API entry for the frontend.
    location /api/ {
        auth_request      /oauth2/auth;
        auth_request_set  $auth_user  $upstream_http_x_auth_request_user;
        auth_request_set  $auth_email $upstream_http_x_auth_request_email;
        proxy_pass         http://owt_net_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-User $auth_user;
        proxy_set_header   X-Forwarded-Email $auth_email;
    }

    # Agent control channel entry.
    # NOTE: this endpoint is used by owt-agent and cannot depend on browser OAuth cookies.
    # Keep fixed identity headers for compatibility with old owt-net builds
    # that still require trusted Google identity headers on every websocket.
    location = /ws/control {
        proxy_pass         http://owt_net_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-User owt-agent;
        proxy_set_header   X-Forwarded-Email owt-agent@local;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Same-origin status stream entry for frontend.
    location = /ws/status {
        auth_request      /oauth2/auth;
        auth_request_set  $auth_user  $upstream_http_x_auth_request_user;
        auth_request_set  $auth_email $upstream_http_x_auth_request_email;
        proxy_pass         http://owt_net_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-User $auth_user;
        proxy_set_header   X-Forwarded-Email $auth_email;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
