# oauth2-proxy example for Google OIDC.
# Save as /etc/owt-net/oauth2-proxy.cfg and run:
#   /usr/local/bin/oauth2-proxy --config /etc/owt-net/oauth2-proxy.cfg
#
# Google Cloud Console (OAuth client) allowlist should include:
# - Authorized JavaScript origins: https://owt.wzhex.com
# - Authorized redirect URIs:     https://owt.wzhex.com/oauth2/callback

provider = "google"
oidc_issuer_url = "https://accounts.google.com"

# Replace with your OAuth 2.0 client from Google Cloud Console.
client_id = "REPLACE_ME.apps.googleusercontent.com"
client_secret = "REPLACE_ME"

# Generate URL-safe 32-byte secret with:
#   python3 -c 'import os,base64; print(base64.urlsafe_b64encode(os.urandom(32)).decode().rstrip("="))'
cookie_secret = "REPLACE_ME_BASE64_32B"

http_address = "127.0.0.1:4180"
redirect_url = "https://owt.wzhex.com/oauth2/callback"

# Access allowlist is mandatory on site side.
authenticated_emails_file = "/etc/owt-net/google-allowed-emails.txt"
scope = "openid email profile"

set_xauthrequest = true
pass_authorization_header = false
pass_access_token = false
skip_provider_button = true

cookie_secure = true
cookie_httponly = true
cookie_samesite = "lax"
